<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NUVIRCA</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" href="favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NUVIRCA">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F47A1F">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%;overflow:hidden}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff}
  #marco{position:fixed;inset:0;width:100%;height:100%;border:none;display:none}
  #panel{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    padding:20px;background:linear-gradient(135deg,#F47A1F,#3A9E20);overflow-y:auto}
  .card{background:#fff;border-radius:18px;padding:30px 24px;max-width:380px;width:100%;
    box-shadow:0 12px 40px rgba(0,0,0,.25);text-align:center}
  img.logo{height:64px;margin-bottom:14px}
  h1{font-size:20px;color:#222;margin-bottom:6px}
  p{font-size:14px;color:#666;line-height:1.5;margin-bottom:14px}
  .spinner{width:36px;height:36px;border:4px solid #eee;border-top-color:#F47A1F;
    border-radius:50%;animation:spin 1s linear infinite;margin:14px auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .btn{display:block;width:100%;background:#F47A1F;color:#fff;text-decoration:none;border:none;
    padding:14px;border-radius:11px;font-size:16px;font-weight:600;margin-top:10px;cursor:pointer}
  .btn.green{background:#3A9E20}
  .aviso{background:#FFF7ED;border:1px solid #FED7AA;border-radius:11px;padding:13px;
    margin-top:16px;font-size:13px;color:#9A3412;text-align:left;line-height:1.5}
  .aviso b{color:#7C2D12}
  .estado{font-size:13px;color:#999;margin-top:12px;min-height:18px}
</style>
</head>
<body>
  <iframe id="marco" allow="camera;microphone;clipboard-write;web-share"></iframe>

  <div id="panel">
    <div class="card">
      <img src="logo.png" class="logo" onerror="this.style.display='none'">
      <h1>NUVIRCA</h1>
      <div id="contenido">
        <div class="spinner"></div>
        <p>Conectando con el sistema...</p>
      </div>
      <div class="estado" id="estado"></div>
    </div>
  </div>

<script>
// La pagina puente MANTIENE SIEMPRE su direccion fija.
// - Si la app esta INSTALADA: carga el sistema DENTRO de un marco (iframe),
//   sin cambiar la direccion, para que el icono no quede apuntando a una
//   direccion vieja.
// - Si se abre en el NAVEGADOR (no instalada): NO redirige sola. Muestra un
//   boton "Entrar" y el aviso para instalar primero, dando tiempo a hacerlo.

let _urlSistema=null;
let _deferredPrompt=null;

window.addEventListener('beforeinstallprompt',(e)=>{ e.preventDefault(); _deferredPrompt=e; });

function estaInstalada(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
}
function esIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
}

async function obtenerUrl(){
  // Leemos direccion.json de DOS fuentes y nos quedamos con la más reciente:
  //  1) raw.githubusercontent.com → se actualiza al instante con cada commit,
  //     SIN depender del deploy de GitHub Pages (que a veces falla o se atrasa).
  //  2) la copia local publicada por Pages → respaldo por si raw no responde.
  // Esto evita quedar con una dirección vieja cuando el deploy de Pages falla.
  const fuentes=[];
  // Deducir usuario/repo desde la URL de esta página (usuario.github.io/repo/)
  try{
    const host=location.hostname;               // alernv-cloud.github.io
    const usuario=host.split('.')[0];
    const partes=location.pathname.split('/').filter(Boolean);
    const repo=partes.length?partes[0]:'';
    if(usuario && repo){
      fuentes.push(`https://raw.githubusercontent.com/${usuario}/${repo}/main/direccion.json?t=`+Date.now());
    }
  }catch(e){}
  fuentes.push('direccion.json?t='+Date.now()); // respaldo local (Pages)

  let mejor=null, mejorFecha='';
  for(const f of fuentes){
    try{
      const r=await fetch(f,{cache:'no-store'});
      if(!r.ok) continue;
      const d=await r.json();
      if(d && d.url && d.url.startsWith('http')){
        const fecha=d.actualizado||'';
        // Nos quedamos con la dirección de fecha más reciente
        if(!mejor || fecha>mejorFecha){ mejor=d.url; mejorFecha=fecha; }
      }
    }catch(e){ /* probar la siguiente fuente */ }
  }
  if(!mejor) throw new Error('sin url');
  return mejor;
}

async function sistemaVivo(url){
  // Comprueba si el túnel responde, con un timeout corto para no colgarse.
  try{
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(), 6000);
    await fetch(url,{mode:'no-cors',cache:'no-store',signal:ctrl.signal});
    clearTimeout(t);
    return true;
  }catch(e){ return false; }
}

async function esperarSistema(url){
  // El túnel de Cloudflare recién creado tarda unos segundos en ser alcanzable.
  // Reintentamos varias veces antes de rendirnos, mostrando el progreso.
  const estado=document.getElementById('estado');
  for(let i=0;i<6;i++){
    if(await sistemaVivo(url)) return true;
    estado.textContent='Esperando a que el sistema responda… ('+(i+1)+'/6)';
    await new Promise(r=>setTimeout(r, 3000));
  }
  return false;
}

function entrarAlSistema(){
  const panel=document.getElementById('panel');
  const marco=document.getElementById('marco');
  marco.src=_urlSistema;
  marco.style.display='block';
  panel.style.display='none';
}

function mostrarError(){
  document.getElementById('contenido').innerHTML=
    '<h1 style="color:#C0392B;font-size:18px;margin-bottom:10px">Sistema no disponible</h1>'+
    '<p>No se pudo conectar todavía. Si acabas de iniciar el acceso en la PC '+
    '(ACCESO-AUTO.bat), el túnel puede tardar hasta un minuto en estar listo.</p>'+
    '<p>Espera unos segundos y pulsa Reintentar. Si la PC está apagada, enciéndela primero.</p>'+
    '<button class="btn" onclick="location.reload()">🔄 Reintentar</button>';
  document.getElementById('estado').textContent='';
}

function mostrarEntrada(){
  // Pantalla cuando se abre en el navegador (no instalada): boton Entrar + aviso instalar
  const contenido=document.getElementById('contenido');
  let avisoInstalar='';
  if(esIOS()){
    avisoInstalar='<div class="aviso">Para tenerlo como app: toca <b>Compartir</b> '+
      '(el cuadro con flecha ↑) y elige <b>"Agregar a inicio"</b>. Luego abre NUVIRCA '+
      'desde el icono.</div>';
  } else {
    avisoInstalar='<div class="aviso">Para tenerlo como app: abre el menu del navegador '+
      '(3 puntos) y elige <b>"Instalar app"</b> o <b>"Agregar a pantalla de inicio"</b>. '+
      'Luego abre NUVIRCA desde el icono.</div>';
  }
  contenido.innerHTML=
    '<p>El sistema esta disponible. Toca para entrar:</p>'+
    '<button class="btn green" onclick="entrarAlSistema()">Entrar al sistema</button>'+
    avisoInstalar;
  // Boton de instalar directo en Android si el navegador lo permite
  if(_deferredPrompt){
    const b=document.createElement('button');
    b.className='btn'; b.textContent='📲 Instalar app';
    b.onclick=async()=>{ _deferredPrompt.prompt(); await _deferredPrompt.userChoice; _deferredPrompt=null; b.remove(); };
    contenido.appendChild(b);
  }
  document.getElementById('estado').textContent='';
}

async function iniciar(){
  const estado=document.getElementById('estado');
  try{
    _urlSistema=await obtenerUrl();
    estado.textContent='Verificando el sistema...';
    const vivo=await esperarSistema(_urlSistema);
    if(!vivo){ mostrarError(); return; }

    if(estaInstalada()){
      // Instalada: entrar directo, dentro del marco (mantiene direccion fija)
      entrarAlSistema();
    } else {
      // Navegador: mostrar boton Entrar + opcion instalar (no redirige solo)
      mostrarEntrada();
    }
  }catch(e){ mostrarError(); }
}
iniciar();
</script>
</body>
</html>
